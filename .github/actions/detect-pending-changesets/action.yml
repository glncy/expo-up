name: Detect Pending Changesets
description: Detect unconsumed pending changeset files and prerelease mode/tag status.
outputs:
  has_pending_changesets:
    description: "true when unconsumed pending .changeset/*.md files exist (excluding README.md)"
    value: ${{ steps.detect.outputs.has_pending_changesets }}
  in_pre_mode:
    description: "true when .changeset/pre.json exists and mode is pre"
    value: ${{ steps.detect.outputs.in_pre_mode }}
  pre_tag:
    description: "current prerelease tag from .changeset/pre.json (for example: next, rc)"
    value: ${{ steps.detect.outputs.pre_tag }}
runs:
  using: composite
  steps:
    - name: Detect pending changeset markdown files
      id: detect
      shell: bash
      run: |
        set -euo pipefail
        detection_json=$(node - <<'NODE'
        const fs = require('fs');
        const path = require('path');

        const changesetDir = '.changeset';
        const files = fs
          .readdirSync(changesetDir)
          .filter((file) => file.endsWith('.md') && file !== 'README.md')
          .map((file) => path.basename(file, '.md'));

        let inPreMode = false;
        let preTag = '';
        let consumed = new Set();

        if (fs.existsSync(path.join(changesetDir, 'pre.json'))) {
          const pre = JSON.parse(
            fs.readFileSync(path.join(changesetDir, 'pre.json'), 'utf8'),
          );
          if (pre?.mode === 'pre' && typeof pre?.tag === 'string') {
            inPreMode = true;
            preTag = pre.tag;
            consumed = new Set(
              Array.isArray(pre?.changesets) ? pre.changesets : [],
            );
          }
        }

        const pending = inPreMode
          ? files.filter((id) => !consumed.has(id))
          : files;

        process.stdout.write(
          JSON.stringify({
            inPreMode,
            preTag,
            filesCount: files.length,
            pendingCount: pending.length,
          }),
        );
        NODE
        )

        in_pre_mode=$(echo "$detection_json" | node -e "const d = JSON.parse(require('fs').readFileSync(0, 'utf8')); process.stdout.write(String(d.inPreMode));")
        pre_tag=$(echo "$detection_json" | node -e "const d = JSON.parse(require('fs').readFileSync(0, 'utf8')); process.stdout.write(d.preTag || '');")
        files_count=$(echo "$detection_json" | node -e "const d = JSON.parse(require('fs').readFileSync(0, 'utf8')); process.stdout.write(String(d.filesCount));")
        pending_count=$(echo "$detection_json" | node -e "const d = JSON.parse(require('fs').readFileSync(0, 'utf8')); process.stdout.write(String(d.pendingCount));")

        echo "in_pre_mode=$in_pre_mode" >> "$GITHUB_OUTPUT"
        echo "pre_tag=$pre_tag" >> "$GITHUB_OUTPUT"

        if [ "$pending_count" -gt 0 ]; then
          echo "has_pending_changesets=true" >> "$GITHUB_OUTPUT"
          echo "Found $pending_count unconsumed pending changeset file(s) out of $files_count total."
        else
          echo "has_pending_changesets=false" >> "$GITHUB_OUTPUT"
          echo "No unconsumed pending changeset files found (total changeset files: $files_count)."
        fi

        if [ "$in_pre_mode" = "true" ]; then
          echo "Prerelease mode is active with tag: $pre_tag"
        else
          echo "Prerelease mode is inactive."
        fi
