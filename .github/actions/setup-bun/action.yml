name: Setup Bun Workspace
description: Setup Bun, restore turbo/Bun caches, and install dependencies.
inputs:
  bun-version:
    description: Bun version to install
    required: false
    default: "1.3.6"
runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Restore turbo and bun caches
      uses: actions/cache@v4
      with:
        path: |
          .turbo
          ~/.bun/install/cache
        key: ${{ runner.os }}-turbo-${{ github.ref }}-${{ hashFiles('bun.lock', 'turbo.json', 'package.json', 'packages/**/package.json', 'apps/**/package.json') }}
        restore-keys: |
          ${{ runner.os }}-turbo-${{ github.ref }}-
          ${{ runner.os }}-turbo-refs/heads/main-
          ${{ runner.os }}-turbo-

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
