name: PR Quality

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Restore turbo and bun caches
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            ~/.bun/install/cache
          key: ${{ runner.os }}-turbo-${{ github.workflow }}-${{ github.ref }}-${{ hashFiles('bun.lock', 'turbo.json', 'package.json', 'packages/**/package.json', 'apps/**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.workflow }}-${{ github.ref }}-
            ${{ runner.os }}-turbo-${{ github.workflow }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build workspace
        run: bun run build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Restore turbo and bun caches
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            ~/.bun/install/cache
          key: ${{ runner.os }}-turbo-${{ github.workflow }}-${{ github.ref }}-${{ hashFiles('bun.lock', 'turbo.json', 'package.json', 'packages/**/package.json', 'apps/**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.workflow }}-${{ github.ref }}-
            ${{ runner.os }}-turbo-${{ github.workflow }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Restore turbo and bun caches
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            ~/.bun/install/cache
          key: ${{ runner.os }}-turbo-${{ github.workflow }}-${{ github.ref }}-${{ hashFiles('bun.lock', 'turbo.json', 'package.json', 'packages/**/package.json', 'apps/**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.workflow }}-${{ github.ref }}-
            ${{ runner.os }}-turbo-${{ github.workflow }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint

  check-types:
    name: Check Types
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Restore turbo and bun caches
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            ~/.bun/install/cache
          key: ${{ runner.os }}-turbo-${{ github.workflow }}-${{ github.ref }}-${{ hashFiles('bun.lock', 'turbo.json', 'package.json', 'packages/**/package.json', 'apps/**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.workflow }}-${{ github.ref }}-
            ${{ runner.os }}-turbo-${{ github.workflow }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run type checks
        run: bun run check-types
