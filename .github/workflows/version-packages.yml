name: Version Packages

on:
  push:
    branches: [main]

jobs:
  version-packages:
    name: Create/Update Version PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Restore turbo and bun caches
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            ~/.bun/install/cache
          key: ${{ runner.os }}-turbo-${{ github.workflow }}-${{ github.ref }}-${{ hashFiles('bun.lock', 'turbo.json', 'package.json', 'packages/**/package.json', 'apps/**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.workflow }}-${{ github.ref }}-
            ${{ runner.os }}-turbo-${{ github.workflow }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create version PR with Changesets
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
