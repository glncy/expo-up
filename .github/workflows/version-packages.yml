name: Version Packages

on:
  push:
    branches: [main]

jobs:
  version-packages:
    name: Create/Update Version PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changeset and prerelease status
        id: detect
        uses: ./.github/actions/detect-pending-changesets

      - name: Setup Node
        if: steps.detect.outputs.in_pre_mode != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup workspace
        if: steps.detect.outputs.in_pre_mode != 'true'
        uses: ./.github/actions/setup-bun

      - name: Create version PR with Changesets
        if: steps.detect.outputs.in_pre_mode != 'true'
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip version PR in prerelease mode
        if: steps.detect.outputs.in_pre_mode == 'true'
        run: echo "Skipping version PR because prerelease mode is active with tag '${{ steps.detect.outputs.pre_tag }}'."
