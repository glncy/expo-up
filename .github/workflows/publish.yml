name: Publish Packages

on:
  push:
    branches: [main]
  release:
    types: [published]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-main:
    name: Build (main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup workspace
        uses: ./.github/actions/setup-bun

      - name: Build workspace
        run: bun run build

  test-main:
    name: Test (main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-main
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup workspace
        uses: ./.github/actions/setup-bun

      - name: Run tests
        run: bun run test

  lint-main:
    name: Lint (main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-main
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup workspace
        uses: ./.github/actions/setup-bun

      - name: Run lint
        run: bun run lint

  check-types-main:
    name: Check Types (main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-main
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup workspace
        uses: ./.github/actions/setup-bun

      - name: Run type checks
        run: bun run check-types

  detect-pending-changesets:
    name: Detect Pending Changesets (main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      has_pending_changesets: ${{ steps.detect.outputs.has_pending_changesets }}
      in_pre_mode: ${{ steps.detect.outputs.in_pre_mode }}
      pre_tag: ${{ steps.detect.outputs.pre_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect pending changesets
        id: detect
        uses: ./.github/actions/detect-pending-changesets

  publish-next:
    name: Publish Next (main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-pending-changesets.outputs.has_pending_changesets == 'true' && needs.detect-pending-changesets.outputs.pre_tag == 'next'
    runs-on: ubuntu-latest
    needs:
      - test-main
      - lint-main
      - check-types-main
      - detect-pending-changesets
    permissions:
      contents: write
      id-token: write
    environment: npm-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup publish workspace
        uses: ./.github/actions/setup-publish

      - name: Version prerelease packages
        run: bun run version-packages

      - name: Commit prerelease version changes
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain)" ]; then
            echo "No version changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: apply prerelease version updates [skip ci]"
          git push origin HEAD:main

      - name: Publish next prerelease versions from changesets
        env:
          NPM_CONFIG_PROVENANCE: "true"
          NODE_AUTH_TOKEN: ""
        run: bun run release:next

  publish-rc:
    name: Publish RC (prerelease)
    if: github.event_name == 'release' && github.event.release.prerelease == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment: npm-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup publish workspace
        uses: ./.github/actions/setup-publish

      - name: Detect pending changesets
        id: detect
        uses: ./.github/actions/detect-pending-changesets

      - name: Publish rc prerelease versions from changesets
        if: steps.detect.outputs.has_pending_changesets == 'true' && steps.detect.outputs.pre_tag == 'rc'
        env:
          NPM_CONFIG_PROVENANCE: "true"
          NODE_AUTH_TOKEN: ""
        run: |
          set -euo pipefail
          bun run version-packages
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: apply rc prerelease version updates [skip ci]"
            git push origin HEAD:main
          fi
          bun run release:rc

      - name: Skip RC publish (no pending rc changesets)
        if: steps.detect.outputs.has_pending_changesets != 'true' || steps.detect.outputs.pre_tag != 'rc'
        run: echo "Skipping RC publish because no pending rc prerelease changesets were detected."

  publish-latest:
    name: Publish Latest (release)
    if: github.event_name == 'release' && github.event.release.prerelease == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: npm-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup publish workspace
        uses: ./.github/actions/setup-publish

      - name: Publish latest from versioned packages
        env:
          NPM_CONFIG_PROVENANCE: "true"
          NODE_AUTH_TOKEN: ""
        run: bun run release
